name: CI Pipeline

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run environment config tests
        run: python -m pytest tests/test_agent.py::test_environment_config tests/test_agent.py::test_server_connectivity -v

      - name: Run full tests (skip if no server)
        run: python -m pytest tests/test_agent.py -v --ignore-glob="*nl2sql*"
        continue-on-error: true