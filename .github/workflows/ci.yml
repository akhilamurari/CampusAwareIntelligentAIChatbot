name: CI Pipeline

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight dependencies only
        run: |
          pip install pytest python-dotenv pydantic pydantic-settings

      - name: Run CI tests
        run: python -m pytest tests/test_ci.py -v