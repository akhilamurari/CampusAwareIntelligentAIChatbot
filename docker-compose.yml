services:
  chatbot:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
    env_file:
      - .env
    environment:
      # ── Sprint 4 (CF1CT-24 — Akhila): NIM Mode Switching ──
      - NIM_MODE=${NIM_MODE:-cloud}
      - NIM_API_KEY=${NIM_API_KEY}
      - NIM_BASE_URL_CLOUD=${NIM_BASE_URL_CLOUD:-https://integrate.api.nvidia.com/v1}
      - NIM_BASE_URL_ONPREM=${NIM_BASE_URL_ONPREM:-http://aiotcentre-03.latrobe.edu.au:8000/v1}
      # ── Sprint 3 (CF1CT-22 — Ansu): Model Configuration ──
      - NIM_MODEL=${NIM_MODEL:-meta/llama-3.1-70b-instruct}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/app/data/campus.db}
      - FAISS_INDEX_PATH=${FAISS_INDEX_PATH:-/app/data/campus_rag.index}
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped
