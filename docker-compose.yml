services:
  chatbot:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
    env_file:
      - .env
    environment:
      - NIM_BASE_URL=${NIM_BASE_URL:-http://aiotcentre-03.latrobe.edu.au:8000/v1}
      - NIM_MODEL=${NIM_MODEL:-meta/llama-3.1-8b-instruct}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-/app/data/campus.db}
      - FAISS_INDEX_PATH=${FAISS_INDEX_PATH:-/app/data/campus_rag.index}
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped