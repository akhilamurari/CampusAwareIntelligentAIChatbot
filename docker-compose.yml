services:
  chatbot:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
    env_file:
      - .env
    environment:
      - NIM_BASE_URL=${NIM_BASE_URL:-http://aiotcentre-03.latrobe.edu.au:8000/v1}
      - NIM_MODEL=${NIM_MODEL:-meta/llama-3.1-8b-instruct}
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped